  <!-- Yazı -->
  <g transform="translate(130,27)">
    <text x="0" y="33" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="300" fill="#FFFFFF">
      Binlerce Öğrenci Fixoku ile
    </text>

    <text x="330" y="33" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="400" fill="url(#textAccent)">Okuma Hızını Artırdı</text>
