<svg width="760" height="110" viewBox="0 0 760 110" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cupGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE37A"></stop>
      <stop offset="100%" stop-color="#D89B00"></stop>
    </linearGradient>

    <linearGradient id="cupDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A76B00"></stop>
      <stop offset="100%" stop-color="#6E4300"></stop>
    </linearGradient>

    <linearGradient id="textAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4B1E74"></stop>
      <stop offset="100%" stop-color="#642A8E"></stop>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.18"></feDropShadow>
    </filter>
  </defs>

  <!-- Sol ikon grubu -->
  <g transform="translate(14,10)" filter="url(#softShadow)">
    <!-- kupa -->
    <path d="M48 8H88V20C88 36 75 48 68 52C61 48 48 36 48 20V8Z" fill="url(#cupGold)"></path>
    <rect x="56" y="52" width="24" height="11" rx="3" fill="url(#cupGold)"></rect>
    <rect x="49" y="63" width="38" height="8" rx="4" fill="url(#cupDark)"></rect>
    <path d="M47 18H33C28 18 24 22 24 27C24 36 31 40 40 40" stroke="#F6C93B" stroke-width="6" stroke-linecap="round"></path>
    <path d="M89 18H103C108 18 112 22 112 27C112 36 105 40 96 40" stroke="#F6C93B" stroke-width="6" stroke-linecap="round"></path>

    <!-- hedef -->
    <g transform="translate(-2,28)">
      <circle cx="30" cy="28" r="23" fill="#F6D35F"></circle>
      <circle cx="30" cy="28" r="18" fill="#111"></circle>
      <circle cx="30" cy="28" r="13" fill="#F6D35F"></circle>
      <circle cx="30" cy="28" r="8" fill="#D73A2F"></circle>
      <circle cx="30" cy="28" r="3.2" fill="#F6D35F"></circle>
      <path d="M0 30H15" stroke="#C78B00" stroke-width="4" stroke-linecap="round"></path>
      <path d="M15 30L8 25" stroke="#C78B00" stroke-width="4" stroke-linecap="round"></path>
      <path d="M15 30L8 35" stroke="#C78B00" stroke-width="4" stroke-linecap="round"></path>
    </g>
